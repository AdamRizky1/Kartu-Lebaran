<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Ucapan Lebaran</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4a847;
  --gold-light: #f0c96b;
  --teal: #1a6b6b;
  --teal-dark: #0d4040;
  --teal-light: #2a9a9a;
  --night: #05142a;
  --star: #ffe87c;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--night);
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  position: relative;
}
.sky {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(26,107,107,.25) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 5%, rgba(212,168,71,.12) 0%, transparent 50%),
    linear-gradient(180deg, #03101f 0%, #05142a 55%, #0d2b1a 100%);
}
.stars-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.stars-layer::before, .stars-layer::after {
  content: ''; position: absolute; top: 0; left: 0;
  width: 2px; height: 2px; border-radius: 50%; background: transparent;
  box-shadow:
    12vw 8vh 0 1px #ffe87c, 25vw 5vh 0 1px #fff, 37vw 12vh 0 0.5px #ffe87c,
    50vw 3vh 0 1px #fff, 63vw 9vh 0 1px #ffe87c, 78vw 6vh 0 0.5px #fff,
    90vw 14vh 0 1px #ffe87c, 8vw 22vh 0 0.5px #fff, 18vw 18vh 0 1px #ffe87c,
    30vw 25vh 0 0.5px #fff, 42vw 20vh 0 1px #ffe87c, 55vw 16vh 0 0.5px #fff,
    68vw 22vh 0 1px #ffe87c, 80vw 19vh 0 0.5px #fff, 93vw 24vh 0 1px #ffe87c;
  animation: twinkleA 2.3s ease-in-out infinite;
}
.stars-layer::after {
  box-shadow:
    5vw 30vh 0 0.5px #fff, 17vw 35vh 0 1px #ffe87c, 28vw 40vh 0 0.5px #fff,
    40vw 28vh 0 1px #ffe87c, 52vw 33vh 0 0.5px #fff, 65vw 38vh 0 1px #ffe87c,
    75vw 30vh 0 0.5px #fff, 85vw 35vh 0 1px #ffe87c, 95vw 28vh 0 0.5px #fff,
    3vw 45vh 0 1px #ffe87c, 15vw 48vh 0 0.5px #fff, 22vw 55vh 0 1px #ffe87c,
    35vw 50vh 0 0.5px #fff, 48vw 52vh 0 1px #ffe87c, 60vw 47vh 0 0.5px #fff;
  animation: twinkleA 3.1s ease-in-out infinite 1.2s;
}
@keyframes twinkleA { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

.moon-container {
  position: fixed; top: 5vh; right: 10vw; z-index: 2;
  width: 80px; height: 80px;
  animation: moonRise 1.5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes moonRise {
  from { opacity: 0; transform: translateY(40px) scale(.5); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.moon {
  width: 80px; height: 80px; border-radius: 50%;
  background: radial-gradient(circle at 38% 38%, #fff9d6, #ffe87c 30%, #d4a847 65%, #a07820 100%);
  animation: moonGlow 3s ease-in-out infinite; position: relative;
}
@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 30px 10px rgba(212,168,71,.4), 0 0 70px 25px rgba(212,168,71,.15); }
  50%       { box-shadow: 0 0 50px 20px rgba(212,168,71,.65), 0 0 110px 45px rgba(212,168,71,.28); }
}
.moon::before {
  content: ''; position: absolute; top: 18px; left: 22px;
  width: 14px; height: 14px; border-radius: 50%; background: rgba(160,120,32,.25);
}
.moon::after {
  content: ''; position: absolute; top: 40px; left: 40px;
  width: 9px; height: 9px; border-radius: 50%; background: rgba(160,120,32,.2);
}

.lights-row { position: fixed; top: 0; left: 0; width: 100%; z-index: 3; pointer-events: none; }
.lights-row::before {
  content: ''; display: block; position: absolute;
  top: 12px; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent 0%, rgba(180,140,60,.6) 3%, rgba(180,140,60,.6) 97%, transparent 100%);
}
.lights-container { display: flex; justify-content: space-around; align-items: flex-start; padding: 0 1%; position: relative; }
.lamp { display: flex; flex-direction: column; align-items: center; }
.lamp-wire { width: 1.5px; background: rgba(160,120,40,.55); }
.lamp-bulb { border-radius: 50% 50% 45% 45%; position: relative; animation: lampGlow var(--glow-dur,2s) ease-in-out infinite var(--glow-delay,0s); }
.lamp-bulb::before {
  content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
  width: 40%; height: 6px; border-radius: 2px; background: rgba(80,60,20,.9);
}
.lamp-bulb::after {
  content: ''; position: absolute; top: 18%; left: 18%;
  width: 28%; height: 22%; border-radius: 50%;
  background: rgba(255,255,255,.4); transform: rotate(-30deg);
}
@keyframes lampGlow {
  0%, 100% { opacity: .65; filter: brightness(.75); }
  50%       { opacity: 1;   filter: brightness(1.4); }
}
.lamp-merah  .lamp-bulb { background: radial-gradient(circle at 35% 35%, #ff9090, #cc1515); box-shadow: 0 0 10px 5px rgba(220,30,30,.65),  0 0 24px 10px rgba(220,30,30,.2); }
.lamp-kuning .lamp-bulb { background: radial-gradient(circle at 35% 35%, #fff080, #d4a020); box-shadow: 0 0 10px 5px rgba(212,168,0,.7),   0 0 24px 10px rgba(212,168,0,.25); }
.lamp-hijau  .lamp-bulb { background: radial-gradient(circle at 35% 35%, #90ffc0, #159a45); box-shadow: 0 0 10px 5px rgba(20,160,60,.65),  0 0 24px 10px rgba(20,160,60,.2); }
.lamp-biru   .lamp-bulb { background: radial-gradient(circle at 35% 35%, #90d0ff, #1560c0); box-shadow: 0 0 10px 5px rgba(20,100,210,.65), 0 0 24px 10px rgba(20,100,210,.2); }
.lamp-ungu   .lamp-bulb { background: radial-gradient(circle at 35% 35%, #d890ff, #7015cc); box-shadow: 0 0 10px 5px rgba(130,20,220,.65), 0 0 24px 10px rgba(130,20,220,.2); }
.lamp-oranye .lamp-bulb { background: radial-gradient(circle at 35% 35%, #ffc070, #d05510); box-shadow: 0 0 10px 5px rgba(210,90,10,.65),  0 0 24px 10px rgba(210,90,10,.2); }
.lamp-pink   .lamp-bulb { background: radial-gradient(circle at 35% 35%, #ffb0d8, #cc1575); box-shadow: 0 0 10px 5px rgba(210,20,120,.65), 0 0 24px 10px rgba(210,20,120,.2); }
.lamp-lg .lamp-bulb { width: 22px; height: 27px; }
.lamp-md .lamp-bulb { width: 16px; height: 20px; }
.lamp-sm .lamp-bulb { width: 12px; height: 14px; }

.page-center {
  position: relative; z-index: 10; min-height: 100vh;
  display: flex; align-items: center; justify-content: center; perspective: 1000px;
}
#flip-toggle { display: none; }
.card-label { cursor: pointer; display: block; width: min(420px, 92vw); min-height: 580px; position: relative; }
.card { width: 100%; min-height: 580px; position: relative; transform-style: preserve-3d; transition: transform .8s cubic-bezier(.4,0,.2,1); }
#flip-toggle:checked ~ .card-wrap .card { transform: rotateY(180deg); }
.card-front, .card-back {
  position: absolute; inset: 0; border-radius: 24px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden;
}
.card-front {
  background:
    radial-gradient(circle at 70% 20%, rgba(212,168,71,.15) 0%, transparent 50%),
    linear-gradient(160deg, #0d2b1a 0%, #05142a 50%, #0d3333 100%);
  border: 1.5px solid rgba(212,168,71,.35);
  box-shadow: 0 0 0 1px rgba(212,168,71,.1), 0 30px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(212,168,71,.2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2.5rem 2rem; gap: .6rem;
}
.card-front::before, .card-front::after {
  content: ''; position: absolute; width: 80px; height: 80px;
  border-color: rgba(212,168,71,.4); border-style: solid;
}
.card-front::before { top: 16px; left: 16px; border-width: 2px 0 0 2px; border-radius: 8px 0 0 0; }
.card-front::after  { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; border-radius: 0 0 8px 0; }
.arabic-text {
  font-family: 'Scheherazade New', serif; font-size: 2rem; color: var(--gold-light);
  text-align: center; text-shadow: 0 0 20px rgba(212,168,71,.5); animation: fadeIn 1s ease both .6s;
}
.main-greeting {
  font-family: 'Scheherazade New', serif; font-size: 1.7rem; font-weight: 700; color: var(--gold);
  text-align: center; letter-spacing: 1px; text-shadow: 0 2px 12px rgba(212,168,71,.4);
  animation: fadeIn 1s ease both .8s;
}
.sub-greeting {
  font-size: .82rem; color: rgba(255,255,255,.6); text-align: center;
  letter-spacing: 3px; text-transform: uppercase; animation: fadeIn 1s ease both 1s;
}
.ornament-line { display: flex; align-items: center; gap: .6rem; width: 80%; animation: fadeIn 1s ease both .9s; }
.ornament-line::before, .ornament-line::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,168,71,.5), transparent);
}
.ornament-line span { color: var(--gold); font-size: 1rem; }
.sender-section { margin-top: .3rem; text-align: center; animation: fadeIn 1s ease both 1.1s; }
.sender-from { font-size: .72rem; color: rgba(255,255,255,.4); letter-spacing: 2px; text-transform: uppercase; }
.sender-name { font-size: 1rem; font-weight: 600; color: rgba(255,255,255,.85); margin-top: 2px; }
.flip-hint {
  position: absolute; bottom: 1.2rem; font-size: .7rem;
  color: rgba(212,168,71,.5); letter-spacing: 1.5px; text-transform: uppercase;
  animation: hintBlink 2s ease-in-out infinite 2s;
}
@keyframes hintBlink { 0%, 100% { opacity: .5; } 50% { opacity: 1; } }
.card-back {
  transform: rotateY(180deg);
  background:
    radial-gradient(circle at 30% 80%, rgba(26,107,107,.2) 0%, transparent 50%),
    linear-gradient(160deg, #0d3333 0%, #05142a 60%, #0d2b1a 100%);
  border: 1.5px solid rgba(42,154,154,.35);
  box-shadow: 0 0 0 1px rgba(42,154,154,.1), 0 30px 80px rgba(0,0,0,.6);
  padding: 2rem 1.8rem;
  display: flex; flex-direction: column; gap: 1.5rem; justify-content: center;
}
.back-header { text-align: center; border-bottom: 1px solid rgba(42,154,154,.25); padding-bottom: .8rem; }
.back-header h3 { font-family: 'Scheherazade New', serif; font-size: 1.3rem; color: var(--teal-light); }
.back-quote {
  background: rgba(212,168,71,.07); border-left: 4px solid var(--gold);
  border-radius: 0 14px 14px 0; padding: 1.5rem 1.4rem; font-size: 1.15rem;
  color: rgba(255,255,255,.85); font-style: italic; line-height: 1.8; text-align: center; flex: 1;
}
.back-btn-wrap { text-align: center; }
.back-btn {
  display: inline-block; background: linear-gradient(135deg, var(--teal), var(--teal-dark));
  color: var(--gold-light); border: 1px solid rgba(212,168,71,.3); border-radius: 10px;
  padding: .65rem 1.8rem; font-family: 'Poppins', sans-serif; font-size: .85rem; font-weight: 600;
  cursor: pointer; letter-spacing: .5px; transition: transform .2s, box-shadow .2s; user-select: none;
}
.back-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,107,107,.4); }
.back-hint { text-align: center; font-size: .68rem; color: rgba(255,255,255,.25); letter-spacing: 1.5px; text-transform: uppercase; }
.masjid-bg {
  position: fixed; inset: 0; z-index: 1; width: 100%; height: 100%;
  object-fit: cover; object-position: center bottom; opacity: 0.18;
  pointer-events: none; mix-blend-mode: luminosity;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 480px) {
  .card-label, .card { min-height: 520px; }
  .arabic-text { font-size: 1.5rem; }
  .main-greeting { font-size: 1.35rem; }
  .moon-container { right: 5vw; }
}
</style>
</head>
<body>

<div class="sky"></div>
<img class="masjid-bg" src="img-kartu-lebaran/Masjid.png" alt="">
<div class="stars-layer"></div>
<div class="moon-container"><div class="moon"></div></div>

<audio id="a" loop src="img-kartu-lebaran/takbiran.mp3"></audio>
<script>document.addEventListener('click',function f(){document.getElementById('a').play();document.removeEventListener('click',f);},{once:true});</script>

<div class="lights-row">
  <div class="lights-container">
    <div class="lamp lamp-merah lamp-lg"><div class="lamp-wire" style="height:28px"></div><div class="lamp-bulb" style="--glow-dur:1.8s;--glow-delay:0s"></div></div>
    <div class="lamp lamp-kuning lamp-sm"><div class="lamp-wire" style="height:18px"></div><div class="lamp-bulb" style="--glow-dur:2.2s;--glow-delay:-0.4s"></div></div>
    <div class="lamp lamp-hijau lamp-md"><div class="lamp-wire" style="height:35px"></div><div class="lamp-bulb" style="--glow-dur:1.6s;--glow-delay:-0.9s"></div></div>
    <div class="lamp lamp-biru lamp-lg"><div class="lamp-wire" style="height:22px"></div><div class="lamp-bulb" style="--glow-dur:2.5s;--glow-delay:-1.3s"></div></div>
    <div class="lamp lamp-ungu lamp-sm"><div class="lamp-wire" style="height:40px"></div><div class="lamp-bulb" style="--glow-dur:1.9s;--glow-delay:-0.6s"></div></div>
    <div class="lamp lamp-oranye lamp-md"><div class="lamp-wire" style="height:25px"></div><div class="lamp-bulb" style="--glow-dur:2.1s;--glow-delay:-1.8s"></div></div>
    <div class="lamp lamp-merah lamp-sm"><div class="lamp-wire" style="height:38px"></div><div class="lamp-bulb" style="--glow-dur:1.7s;--glow-delay:-0.2s"></div></div>
    <div class="lamp lamp-pink lamp-lg"><div class="lamp-wire" style="height:20px"></div><div class="lamp-bulb" style="--glow-dur:2.4s;--glow-delay:-1.1s"></div></div>
    <div class="lamp lamp-hijau lamp-sm"><div class="lamp-wire" style="height:32px"></div><div class="lamp-bulb" style="--glow-dur:1.5s;--glow-delay:-0.7s"></div></div>
    <div class="lamp lamp-kuning lamp-lg"><div class="lamp-wire" style="height:42px"></div><div class="lamp-bulb" style="--glow-dur:2.3s;--glow-delay:-1.5s"></div></div>
    <div class="lamp lamp-biru lamp-sm"><div class="lamp-wire" style="height:26px"></div><div class="lamp-bulb" style="--glow-dur:2s;--glow-delay:-0.3s"></div></div>
    <div class="lamp lamp-oranye lamp-lg"><div class="lamp-wire" style="height:34px"></div><div class="lamp-bulb" style="--glow-dur:1.8s;--glow-delay:-2s"></div></div>
    <div class="lamp lamp-ungu lamp-md"><div class="lamp-wire" style="height:16px"></div><div class="lamp-bulb" style="--glow-dur:2.6s;--glow-delay:-0.8s"></div></div>
    <div class="lamp lamp-merah lamp-md"><div class="lamp-wire" style="height:45px"></div><div class="lamp-bulb" style="--glow-dur:1.6s;--glow-delay:-1.4s"></div></div>
    <div class="lamp lamp-pink lamp-sm"><div class="lamp-wire" style="height:30px"></div><div class="lamp-bulb" style="--glow-dur:2.2s;--glow-delay:-1s"></div></div>
  </div>
</div>
<div class="page-center">
<input type="checkbox" id="flip-toggle">
<div class="card-wrap">
  <label for="flip-toggle" class="card-label">
    <div class="card">
      <div class="card-front">
        <p class="arabic-text">عيد مبارك</p>
        <div class="ornament-line"><span></span></div>
        <h1 class="main-greeting">Selamat Hari Raya</h1>
        <h1 class="main-greeting" style="margin-top:-.3rem">Idul Fitri 1446 H</h1>
        <div class="ornament-line"><span></span></div>
        <p class="sub-greeting">Minal Aidin Wal Faizin</p>
        <div class="sender-section">
          <p class="sender-from">Ucapan dari</p>
          <p class="sender-name">Keluarga Besar</p>
        </div>
        <p class="flip-hint">Ketuk untuk pesan</p>
      </div>
      <div class="card-back">
        <div class="back-header"><h3>Pesan Lebaran</h3></div>
        <div class="back-quote">
          "Taqabbalallahu minna wa minkum."
          <br>
          (Semoga Allah menerima amal ibadah kita semua.)
          <br><br>
          "もし私が間違っていたら、どうかお許しください。"
        </div>
        <div class="back-btn-wrap">
          <label for="flip-toggle" class="back-btn">Kembali ke Kartu</label>
        </div>
        <p class="back-hint">klik tombol untuk kembali</p>
      </div>
    </div>
  </label>
</div>
</div>

</body>
</html>
